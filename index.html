<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frans Marcellino | Elite Vault v8.0</title>
    <meta
      name="description"
      content="Sovereign Digital Repository by Frans Marcellino. High-end software assets."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div id="cursor"></div>

    <div class="container">
      <nav>
        <div
          class="logo"
          id="nav-logo"
          onclick="navigateTo('home')"
          role="button"
          tabindex="0"
          onkeypress="if (event.key === 'Enter') navigateTo('home');"
          aria-label="Kembali ke Beranda"
          style="cursor: pointer"
        >
          FRANS <span>MARCELLINO</span>
        </div>

        <div class="nav-controls">
          <button
            class="theme-toggle"
            onclick="toggleTheme()"
            id="theme-btn"
            aria-label="Ganti Mode Cahaya atau Gelap"
          >
            LIGHT MODE
          </button>
          <div class="menu-wrapper" style="position: relative">
            <button
              class="kebab-btn"
              onclick="toggleMenu()"
              aria-label="Buka Menu Navigasi Utama"
            >
              <span class="dot"></span><span class="dot"></span
              ><span class="dot"></span>
            </button>
            <div id="dropdown" class="dropdown-menu">
              <div id="social-links"></div>
            </div>
          </div>
        </div>
      </nav>

      <main>
        <section id="home" class="page active">
          <div class="hero">
            <div class="hero-glow"></div>
            <div id="hero-badge" class="hero-badge-style"></div>
            <h1 id="hero-title">Architecting Digital Sovereignty.</h1>
            <p id="hero-desc" class="hero-desc-style"></p>
            <div
              style="
                display: flex;
                gap: 15px;
                justify-content: center;
                flex-wrap: wrap;
              "
            >
              <button
                class="btn-premium"
                style="max-width: 280px"
                onclick="navigateTo('market')"
              >
                VIEW REPOSITORY
              </button>
              <button
                class="btn-premium"
                style="
                  max-width: 280px;
                  background: transparent;
                  border: 1px solid var(--border);
                  color: var(--text-main);
                "
                onclick="navigateTo('about')"
              >
                THE STANDARD
              </button>
            </div>
          </div>
        </section>

        <section id="market" class="page">
          <div style="text-align: center; margin-bottom: 50px">
            <h2
              style="
                font-size: 2.8rem;
                letter-spacing: -2px;
                margin-bottom: 10px;
              "
            >
              The Repository
            </h2>
            <p
              id="curated-by"
              style="color: var(--text-dim); font-weight: 300"
            ></p>
          </div>
          <input
            type="text"
            id="search-bar"
            aria-label="Cari aset digital di repositori"
            placeholder="Filter Assets..."
            onkeyup="handleSearch()"
            style="
              width: 100%;
              max-width: 500px;
              margin: 0 auto 40px;
              display: block;
              padding: 18px;
              background: var(--surface);
              border: 1px solid var(--border);
              border-radius: 18px;
              color: var(--text-main);
              outline: none;
            "
          />
          <div class="grid" id="main-grid"></div>
        </section>

        <section id="about" class="page">
          <div style="max-width: 900px; margin: 0 auto; text-align: center">
            <h2 style="font-size: 2.8rem; margin-bottom: 30px">
              Sovereign Architecture
            </h2>
            <div class="grid">
              <div class="card">
                <h3
                  style="
                    color: var(--primary);
                    margin-bottom: 15px;
                    font-size: 1.5rem;
                  "
                >
                  Immutable
                </h3>
                <p style="color: var(--text-dim)">
                  Pondasi kode abadi yang dirancang untuk performa tanpa batas
                  waktu.
                </p>
              </div>
              <div class="card">
                <h3
                  style="
                    color: var(--primary);
                    margin-bottom: 15px;
                    font-size: 1.5rem;
                  "
                >
                  Elite Security
                </h3>
                <p style="color: var(--text-dim)">
                  Keamanan tingkat industri dengan standar enkripsi tanpa
                  kompromi.
                </p>
              </div>
            </div>
          </div>
        </section>

        <section id="contact" class="page">
          <div style="text-align: center; max-width: 500px; margin: 0 auto">
            <h2 style="font-size: 2.8rem; margin-bottom: 25px">
              Direct Inquiry
            </h2>
            <div id="contact-methods"></div>
          </div>
        </section>
      </main>

      <footer
        style="
          text-align: center;
          padding: 40px 20px;
          border-top: 1px solid var(--border);
          margin-top: 50px;
        "
      >
        <p
          id="footer-text"
          style="margin-bottom: 20px; color: var(--text-dim); font-size: 0.9rem"
        ></p>

        <div
          style="
            display: flex;
            justify-content: center;
            gap: 15px;
            filter: grayscale(1) opacity(0.6);
          "
        >
          <a
            href="https://validator.w3.org/check?uri=referer"
            target="_blank"
            rel="noopener"
          >
            <img
              src="https://www.w3.org/Icons/valid-html401"
              alt="W3C HTML 4.01 Valid"
              height="31"
              width="88"
              style="border-radius: 4px"
            />
          </a>
          <a
            href="https://jigsaw.w3.org/css-validator/check/referer"
            target="_blank"
            rel="noopener"
          >
            <img
              src="https://jigsaw.w3.org/css-validator/images/vcss"
              alt="W3C CSS Valid"
              height="31"
              width="88"
              style="border-radius: 4px"
            />
          </a>
        </div>
      </footer>
    </div>

    <div
      id="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="target-name"
    >
      <div class="m-box">
        <h3
          id="target-name"
          style="
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
          "
        >
          ASSET SELECTION
        </h3>
        <p id="target-price" class="modal-price">$0</p>
        <input
          type="text"
          id="client-name"
          aria-label="Masukkan nama lengkap Anda untuk lisensi"
          placeholder="VERIFY FULL NAME"
          class="modal-input"
        />
        <button class="btn-premium" onclick="confirmInquiry()">
          REQUEST LICENSE
        </button>
        <button
          onclick="closeModal()"
          style="
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            margin-top: 25px;
            opacity: 0.5;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 800;
            display: block;
            width: 100%;
          "
          aria-label="Batalkan dan tutup modal"
        >
          CANCEL PROTOCOL
        </button>
      </div>
    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
